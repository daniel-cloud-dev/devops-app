name: CI - Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Clone repositorio
        uses: actions/checkout@v4    

      - name: Build da imagem
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/test-pipeline:latest ./api

      - name: Push da imagem
        run: docker push ${{ secrets.DOCKER_USERNAME }}/test-pipeline:latest

      - name: Rodar container (teste)
        run: docker run -d -p 3000:3000 test-pipeline:latest

      - name: Ver logs
        run: docker logs $(docker ps -q)